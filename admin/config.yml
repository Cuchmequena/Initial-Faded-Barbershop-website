# ============================================================
# Decap CMS (Netlify CMS) — Faded Barbershop
# Panel de administración en español
# Acceso: https://www.fadedbarbershopmadrid.com/admin/
# ============================================================

backend:
  name: git-gateway
  branch: main          # ← Cambia a "master" si tu repositorio usa esa rama

# Carpeta donde se guardan las imágenes subidas desde el CMS
media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

# Idioma del panel de administración
locale: 'es'

# ============================================================
# COLECCIONES
# ============================================================
collections:

  # ──────────────────────────────────────────────────────────
  # 1. INICIO (Home) — Textos de la página principal
  # ──────────────────────────────────────────────────────────
  - name: "home"
    label: "🏠 Inicio"
    files:
      - name: "textos_home"
        label: "Textos de la página de inicio"
        file: "_data/home.json"
        format: json
        description: "Edita los textos principales que aparecen en la web: hero, secciones, programa de fidelidad..."
        fields:
          - label: "— SECCIÓN HERO —"
            name: "hero_section_label"
            widget: "hidden"
            default: ""
          - label: "Texto pequeño bajo el logo"
            name: "hero_eyebrow"
            widget: "string"
            hint: "Ej: Barbería Premium · Ciudad Lineal · Madrid"
          - label: "Eslogan principal (debajo del logo)"
            name: "hero_subtitle"
            widget: "string"
            hint: "Ej: Somos especialistas en dejarte impecable"
          - label: "Texto descriptivo del hero"
            name: "hero_text"
            widget: "string"
            hint: "Ej: Cortes fade, degradados y diseños de precisión."

          - label: "— SECCIÓN SERVICIOS —"
            name: "services_section_label"
            widget: "hidden"
            default: ""
          - label: "Etiqueta pequeña (eyebrow)"
            name: "services_eyebrow"
            widget: "string"
            default: "Lo que hacemos"
          - label: "Título de la sección"
            name: "services_title"
            widget: "string"
            default: "NUESTROS SERVICIOS"
          - label: "Descripción de la sección"
            name: "services_desc"
            widget: "string"
            default: "No es solo un corte, es una experiencia premium"

          - label: "— SECCIÓN GALERÍA —"
            name: "gallery_section_label"
            widget: "hidden"
            default: ""
          - label: "Etiqueta pequeña (eyebrow)"
            name: "gallery_eyebrow"
            widget: "string"
            default: "Nuestro trabajo"
          - label: "Título de la sección"
            name: "gallery_title"
            widget: "string"
            default: "RESULTADOS REALES"
          - label: "Descripción de la sección"
            name: "gallery_desc"
            widget: "string"
            default: "Cada corte es una obra de arte. Mira lo que hacemos."

          - label: "— SECCIÓN EQUIPO —"
            name: "team_section_label"
            widget: "hidden"
            default: ""
          - label: "Etiqueta pequeña (eyebrow)"
            name: "team_eyebrow"
            widget: "string"
            default: "Las personas detrás del arte"
          - label: "Título de la sección"
            name: "team_title"
            widget: "string"
            default: "NUESTRO EQUIPO"
          - label: "Descripción de la sección"
            name: "team_desc"
            widget: "string"
            default: "Nuestros barberos son auténticos artistas"

          - label: "— PROGRAMA DE FIDELIDAD —"
            name: "loyalty_section_label"
            widget: "hidden"
            default: ""
          - label: "Texto explicativo"
            name: "loyalty_text"
            widget: "text"
            hint: "Descripción del programa de fidelidad"
          - label: "Texto destacado (la oferta principal)"
            name: "loyalty_highlight"
            widget: "string"
            hint: "Ej: Cada 5 cortes → El 6º GRATIS"
          - label: "Texto pequeño debajo"
            name: "loyalty_sub"
            widget: "string"
            hint: "Ej: Porque los mejores clientes merecen los mejores premios"

          - label: "— POR QUÉ ELEGIRNOS —"
            name: "whyus_section_label"
            widget: "hidden"
            default: ""
          - label: "Descripción de las reseñas"
            name: "whyus_reviews_desc"
            widget: "string"
            default: "Puntuación perfecta 5.0/5.0 verificada por nuestros clientes"
          - label: "Título tarjeta reseñas"
            name: "whyus_reviews_title"
            widget: "string"
            default: "Reseñas 5 Estrellas"
          - label: "Nombres destacados (tarjeta barberos)"
            name: "whyus_barbers_names"
            widget: "string"
            default: "Cristian Viedma & Jennson"
          - label: "Título tarjeta barberos"
            name: "whyus_barbers_title"
            widget: "string"
            default: "Barberos Expertos"
          - label: "Descripción tarjeta barberos"
            name: "whyus_barbers_text"
            widget: "string"
            default: "Barberos expertos en cortes modernos, fades, barbas y asesoramiento personalizado."
          - label: "Número destacado fidelidad"
            name: "whyus_loyalty_number"
            widget: "string"
            default: "5 → 1 Gratis"
          - label: "Título tarjeta fidelidad"
            name: "whyus_loyalty_title"
            widget: "string"
            default: "Programa Fidelidad"
          - label: "Descripción tarjeta fidelidad"
            name: "whyus_loyalty_desc"
            widget: "string"
            default: "Primera visita: tarjeta de descuento. Cada 5 cortes, el 6º completamente gratis"

  # ──────────────────────────────────────────────────────────
  # 2. CONFIGURACIÓN del negocio
  # ──────────────────────────────────────────────────────────
  - name: "configuracion"
    label: "⚙️ Configuración"
    files:
      - name: "datos_negocio"
        label: "Negocio, contacto y horario"
        file: "_data/config.json"
        format: json
        description: "Teléfono, WhatsApp, Instagram, horario, dirección, analytics... Todo lo que aparece en la web."
        fields:
          - label: "Nombre del negocio"
            name: "business_name"
            widget: "string"
          - label: "Eslogan / tagline"
            name: "tagline"
            widget: "string"

          - label: "— CONTACTO —"
            name: "contact_label"
            widget: "hidden"
            default: ""
          - label: "Teléfono (para mostrar)"
            name: "phone"
            widget: "string"
            hint: "Ej: +34 691 068 660"
          - label: "Teléfono (para enlace)"
            name: "phone_href"
            widget: "string"
            hint: "Ej: tel:+34691068660 (sin espacios)"
          - label: "WhatsApp (para mostrar)"
            name: "whatsapp"
            widget: "string"
            hint: "Ej: +34 603 147 958"
          - label: "WhatsApp (enlace wa.me)"
            name: "whatsapp_href"
            widget: "string"
            hint: "Ej: https://wa.me/34603147958 (sin espacios ni +)"
          - label: "Email de contacto"
            name: "email"
            widget: "string"

          - label: "— REDES SOCIALES Y RESERVAS —"
            name: "social_label"
            widget: "hidden"
            default: ""
          - label: "Instagram (con @)"
            name: "instagram_handle"
            widget: "string"
            hint: "Ej: @faded_madrid"
          - label: "URL de Instagram"
            name: "instagram_url"
            widget: "string"
          - label: "URL de Booksy (para reservas)"
            name: "booksy_url"
            widget: "string"
            hint: "La URL completa de tu perfil en Booksy"

          - label: "— DIRECCIÓN —"
            name: "address_label"
            widget: "hidden"
            default: ""
          - label: "Calle y número"
            name: "address_street"
            widget: "string"
          - label: "Código postal y ciudad"
            name: "address_city"
            widget: "string"
          - label: "Enlace a Google Maps"
            name: "maps_url"
            widget: "string"
          - label: "Mapa embebido de Google"
            name: "maps_embed_url"
            widget: "string"
            required: false
            hint: "Pega aquí la URL del iframe de Google Maps para el mapa incrustado de la home."
          - label: "URL para dejar reseña en Google"
            name: "google_review_url"
            widget: "string"
            required: false
            hint: "Enlace directo a la ficha de Google para dejar reseña."

          - label: "— HORARIO —"
            name: "hours_label"
            widget: "hidden"
            default: ""
          - label: "Días laborables (etiqueta)"
            name: "hours_weekdays_label"
            widget: "string"
            hint: "Ej: Lunes — Sábado"
          - label: "Horario laborables"
            name: "hours_weekdays_time"
            widget: "string"
            hint: "Ej: 11:00 — 21:30"
          - label: "Día de cierre (etiqueta)"
            name: "hours_weekend_label"
            widget: "string"
            hint: "Ej: Domingo"
          - label: "Horario de cierre"
            name: "hours_weekend_time"
            widget: "string"
            hint: "Ej: Cerrado"

          - label: "— VALORACIONES —"
            name: "reviews_label"
            widget: "hidden"
            default: ""
          - label: "Número de reseñas"
            name: "reviews_count"
            widget: "string"
            hint: "Ej: 119. Se usa en el hero y en el contador animado de la home."
          - label: "Puntuación media"
            name: "reviews_score"
            widget: "string"
            hint: "Ej: 5.0. Se usa junto al contador de reseñas."

          - label: "— ANALYTICS Y TRACKING —"
            name: "analytics_label"
            widget: "hidden"
            default: ""
          - label: "Google Analytics 4 — ID de medición"
            name: "ga4_id"
            widget: "string"
            required: false
            hint: "Ej: G-XXXXXXXXXX — Deja vacío para desactivar Analytics"
          - label: "Meta Pixel — ID"
            name: "meta_pixel_id"
            widget: "string"
            required: false
            hint: "Ej: 1234567890123456 — Deja vacío para desactivar Meta Pixel"

      - name: "seo"
        label: "SEO — Meta etiquetas"
        file: "_data/seo.json"
        format: json
        description: "Controla cómo aparece la web en Google y redes sociales."
        fields:
          - label: "Título principal (pestaña del navegador)"
            name: "site_title"
            widget: "string"
            hint: "Ej: Faded Barbershop Madrid | Barbería Premium Ciudad Lineal"
          - label: "Meta descripción"
            name: "meta_description"
            widget: "text"
            hint: "Aparece bajo el título en Google. Máximo 155 caracteres."
          - label: "Keywords"
            name: "meta_keywords"
            widget: "string"
            required: false
            hint: "Separadas por comas. Ej: barbería madrid, fade madrid, corte degradado"
          - label: "URL canónica del sitio"
            name: "canonical_url"
            widget: "string"
            hint: "Ej: https://www.fadedbarbershopmadrid.com/"
          - label: "H1 SEO principal"
            name: "hidden_h1"
            widget: "string"
            required: false
            hint: "Titular SEO principal de la home. No cambia el logo visual, pero ayuda a Google a entender mejor la página."
          - label: "Título bloque SEO"
            name: "hidden_h2_primary"
            widget: "string"
            required: false
            hint: "Título del bloque informativo SEO que aparece al final de la home."
          - label: "Subtítulo bloque SEO"
            name: "hidden_h2_secondary"
            widget: "string"
            required: false
            hint: "Segundo titular del bloque SEO/ficha informativa."
          - label: "Texto de apoyo SEO"
            name: "hidden_support_text"
            widget: "text"
            required: false
            hint: "Texto descriptivo largo. Separa párrafos dejando una línea en blanco."
          - label: "Zonas / búsquedas cercanas"
            name: "hidden_h3_areas"
            widget: "string"
            required: false
            hint: "Separadas por comas. Ej: Barbería en Ciudad Lineal, Barbería en La Elipa, Barbería cerca de Ventas"

          - label: "— OPEN GRAPH (redes sociales) —"
            name: "og_label"
            widget: "hidden"
            default: ""
          - label: "Título Open Graph"
            name: "og_title"
            widget: "string"
            required: false
            hint: "Título que aparece al compartir en Facebook/WhatsApp. Ej: Faded Barbershop | Barbería en Madrid"
          - label: "Descripción Open Graph"
            name: "og_description"
            widget: "text"
            required: false
            hint: "Texto que aparece bajo el título al compartir. Máximo 200 caracteres."
          - label: "Imagen Open Graph (para redes sociales)"
            name: "og_image"
            widget: "image"
            required: false
            hint: "Imagen que aparece al compartir en WhatsApp, Facebook, etc. 1200×630px recomendado."

          - label: "— TWITTER / X —"
            name: "twitter_label"
            widget: "hidden"
            default: ""
          - label: "Título Twitter"
            name: "twitter_title"
            widget: "string"
            required: false
            hint: "Título para Twitter/X. Ej: Faded Barbershop Madrid | Barbería Premium"
          - label: "Descripción Twitter"
            name: "twitter_description"
            widget: "string"
            required: false
            hint: "Texto breve para Twitter/X. Máximo 200 caracteres."

          - label: "— PREGUNTAS FRECUENTES —"
            name: "faq_label"
            widget: "hidden"
            default: ""
          - label: "Preguntas frecuentes (FAQ para Google)"
            name: "faqs"
            widget: "list"
            label_singular: "Pregunta"
            required: false
            summary: "{{fields.question}}"
            fields:
              - label: "Pregunta"
                name: "question"
                widget: "string"
              - label: "Respuesta"
                name: "answer"
                widget: "text"

  # ──────────────────────────────────────────────────────────
  # 3. AVISO ESPECIAL (banner de alerta en la web)
  # ──────────────────────────────────────────────────────────
  - name: "aviso"
    label: "📢 Aviso especial"
    files:
      - name: "aviso_activo"
        label: "Banner de aviso en la web"
        file: "_data/notice.json"
        format: json
        description: "Muestra un aviso en la parte superior de la web. Ideal para cierres por vacaciones, cambios de horario, promociones puntuales..."
        fields:
          - label: "Activar aviso"
            name: "active"
            widget: "boolean"
            default: false
            hint: "Activa para que el aviso aparezca en la parte superior de toda la web con animación horizontal."
          - label: "Tipo de aviso"
            name: "type"
            widget: "select"
            options:
              - label: "ℹ️ Información (azul)"
                value: "info"
              - label: "⚠️ Aviso (dorado)"
                value: "warning"
              - label: "❌ Cierre / Urgente (rojo)"
                value: "alert"
              - label: "🎉 Promoción (verde)"
                value: "promo"
            default: "info"
            hint: "Elige el color según la urgencia del aviso"
          - label: "Texto del aviso"
            name: "message"
            widget: "string"
            hint: "Ej: Cerramos por vacaciones del 1 al 15 de agosto. ¡Hasta pronto!"
          - label: "Texto del enlace (opcional)"
            name: "link_text"
            widget: "string"
            required: false
            hint: "Ej: Reservar antes → | Ver más →. Si lo usas, rellena también la URL."
          - label: "URL del enlace (opcional)"
            name: "link_url"
            widget: "string"
            required: false
            hint: "URL a la que lleva el enlace del aviso. Si la dejas vacía, no se mostrará botón."

  # ──────────────────────────────────────────────────────────
  # 4. SERVICIOS
  # ──────────────────────────────────────────────────────────
  - name: "servicios"
    label: "✂️ Servicios"
    files:
      - name: "todos"
        label: "Todos los servicios"
        file: "_data/services.json"
        format: json
        description: "Añade, edita o elimina servicios. Cambia precios, duraciones y links de pago SumUp."
        fields:
          - label: "Categorías de servicios"
            name: "categories"
            widget: "list"
            label_singular: "Categoría"
            fields:
              - label: "ID (sin espacios, minúsculas)"
                name: "id"
                widget: "string"
                hint: "Identificador interno. Ej: cortes, barba, tratamientos"
              - label: "Título de la categoría"
                name: "title"
                widget: "string"
                hint: "Ej: Cortes, Barba & Cejas, Tratamientos"
              - label: "Servicios"
                name: "items"
                widget: "list"
                label_singular: "Servicio"
                summary: "{{fields.name}} — {{fields.price}}"
                fields:
                  - label: "Nombre del servicio"
                    name: "name"
                    widget: "string"
                  - label: "Precio"
                    name: "price"
                    widget: "string"
                    hint: "Ej: 15€  ó  15,99€  ó  49,99€"
                  - label: "Duración"
                    name: "duration"
                    widget: "string"
                    hint: "Ej: 40 min, 1 hora, +2h 50 min"
                  - label: "Descripción breve (opcional)"
                    name: "desc"
                    widget: "string"
                    required: false
                    hint: "Solo para Pack Premium. Ej: Corte + Barba + Cejas + Limpieza"
                  - label: "Tipo de tarjeta"
                    name: "type"
                    widget: "select"
                    hint: "Elige cómo destacar el servicio en la web"
                    options:
                      - label: "Normal (sin badge)"
                        value: "normal"
                      - label: "Popular — badge POPULAR dorado"
                        value: "featured"
                      - label: "Premium — tarjeta con borde dorado"
                        value: "premium"
                    default: "normal"
                  - label: "🔗 Link de pago SumUp"
                    name: "sumup_link"
                    widget: "string"
                    required: false
                    hint: "Pega aquí el link de pago de SumUp. Ej: https://pay.sumup.com/b2c/XXXXXXXX — Deja vacío para ocultar el botón de pago."

  # ──────────────────────────────────────────────────────────
  # 5. EQUIPO
  # ──────────────────────────────────────────────────────────
  - name: "equipo"
    label: "👥 Equipo"
    files:
      - name: "barberos"
        label: "Miembros del equipo"
        file: "_data/team.json"
        format: json
        description: "Añade o quita barberos. Sube sus fotos directamente."
        fields:
          - label: "Barberos"
            name: "members"
            widget: "list"
            label_singular: "Barbero"
            fields:
              - label: "Nombre completo"
                name: "name"
                widget: "string"
              - label: "Especialidad / Rol"
                name: "role"
                widget: "string"
                hint: "Ej: Barbero Especialista, Barbero Senior"
              - label: "Descripción"
                name: "desc"
                widget: "text"
              - label: "Foto"
                name: "photo"
                widget: "image"
                hint: "Sube una foto del barbero. Tamaño recomendado: 400×500px"
              - label: "Visible en la web"
                name: "active"
                widget: "boolean"
                default: true
                hint: "Desactiva para ocultarlo sin borrarlo"

  # ──────────────────────────────────────────────────────────
  # 6. GALERÍA
  # ──────────────────────────────────────────────────────────
  - name: "galeria"
    label: "🖼️ Galería"
    files:
      - name: "fotos"
        label: "Fotos de la galería"
        file: "_data/gallery.json"
        format: json
        description: "Sube nuevas fotos, elimina las antiguas o cambia el orden arrastrando."
        fields:
          - label: "Imágenes"
            name: "images"
            widget: "list"
            label_singular: "Foto"
            fields:
              - label: "Imagen"
                name: "src"
                widget: "image"
                hint: "JPG o PNG. Tamaño recomendado: cuadrada, mínimo 600×600px"
              - label: "Descripción (para SEO y accesibilidad)"
                name: "alt"
                widget: "string"
                hint: "Describe la foto. Ej: Corte fade degradado en Faded Barbershop Madrid"

  # ──────────────────────────────────────────────────────────
  # 7. PRODUCTOS
  # ──────────────────────────────────────────────────────────
  - name: "productos"
    label: "🧴 Productos"
    files:
      - name: "catalogo"
        label: "Catálogo de productos"
        file: "_data/products.json"
        format: json
        description: "Añade, edita u oculta productos. Sube imágenes, cambia precios y configura los links de pago SumUp."
        fields:
          - label: "— TEXTOS DE LA SECCIÓN —"
            name: "products_texts_label"
            widget: "hidden"
            default: ""
          - label: "Texto pequeño en home"
            name: "home_eyebrow"
            widget: "string"
            default: "Llévate tu acabado a casa"
          - label: "Título de productos en home"
            name: "home_title"
            widget: "string"
            default: "PRODUCTOS FADED"
          - label: "Descripción de productos en home"
            name: "home_desc"
            widget: "text"
            default: "Una selección rápida de bebidas y ceras que puedes recoger directamente en la barbería."
          - label: "Título de la página /productos"
            name: "page_title"
            widget: "string"
            default: "Bebidas y ceras disponibles en Faded."
          - label: "Descripción de la página /productos"
            name: "page_desc"
            widget: "text"
            default: "Consulta los productos disponibles en tienda."
          - label: "Nota inferior de productos"
            name: "page_note"
            widget: "text"
            default: "Disponibilidad sujeta a stock en tienda."
          - label: "— PRODUCTOS —"
            name: "products_list_label"
            widget: "hidden"
            default: ""
          - label: "Productos"
            name: "items"
            widget: "list"
            label_singular: "Producto"
            summary: "{{fields.name}} — {{fields.category}} — {{fields.price}}"
            fields:
              - label: "Slug interno (sin espacios, minúsculas)"
                name: "slug"
                widget: "string"
                hint: "Ej: cera-mate-profesional. No cambies esto si ya existe la página del producto."
              - label: "Visible en la web"
                name: "active"
                widget: "boolean"
                default: true
              - label: "Mostrar también en home"
                name: "show_on_home"
                widget: "boolean"
                default: true
              - label: "Categoría"
                name: "category"
                widget: "string"
                hint: "Ej: Ceras, Bebidas"
              - label: "Nombre del producto"
                name: "name"
                widget: "string"
              - label: "Precio"
                name: "price"
                widget: "string"
                hint: "Ej: 9,99€"
              - label: "Descripción"
                name: "description"
                widget: "text"
              - label: "Detalles destacados"
                name: "details"
                widget: "list"
                required: false
                field:
                  label: "Detalle"
                  name: "detail"
                  widget: "string"
              - label: "Imagen del producto"
                name: "image"
                widget: "image"
                required: false
                hint: "Sube la foto del producto. Si subes una imagen aquí, se usará en lugar de la URL externa."
              - label: "Texto alternativo de la imagen"
                name: "image_alt"
                widget: "string"
                required: false
                hint: "Describe la imagen. Ej: Cera Red One Roja — acabado mate"
              - label: "URL de la página del producto"
                name: "product_url"
                widget: "string"
                required: false
                hint: "Ruta a la página individual. Ej: /productos/cera-mate-profesional.html — Vacío = botón va a WhatsApp."
              - label: "🔗 Link de pago SumUp"
                name: "sumup_link"
                widget: "string"
                required: false
                hint: "Link de pago directo de SumUp. Ej: https://pay.sumup.com/b2c/XXXXXXXX — Deja vacío si no tiene pago online."
